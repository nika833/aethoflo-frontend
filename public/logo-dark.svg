<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40">
  <!-- Icon: overlapping circles — dark circle uses white so it shows on dark bg -->
  <circle cx="16" cy="20" r="13" fill="rgba(255,255,255,0.15)"/>
  <circle cx="27" cy="20" r="13" fill="#C96B47" opacity="0.92"/>
  <!-- Wordmark — "aetho" in white, "flo" in terracotta -->
  <text x="48" y="26" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.9)">aetho</text>
  <text x="101" y="26" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#C96B47">flo</text>
</svg>
