<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
  <title>aethoflo</title>
  <!-- Mark: same as logo but cream intersection shows on dark bg -->
  <circle cx="74" cy="46" r="32" fill="#E87A4E"/>
  <circle cx="42" cy="60" r="20" fill="#2A1810"/>
  <clipPath id="logo-dark-clip">
    <circle cx="42" cy="60" r="20"/>
  </clipPath>
  <g clip-path="url(#logo-dark-clip)">
    <circle cx="74" cy="46" r="32" fill="#FAF5EF"/>
  </g>
  <!-- Wordmark: single text element prevents font-fallback overlap -->
  <text x="118" y="64" font-family="'Source Serif 4', 'Iowan Old Style', Georgia, serif" font-size="38" font-weight="400" letter-spacing="-0.02em" fill="rgba(255,255,255,0.9)">aetho<tspan font-style="italic" fill="#E87A4E">flo</tspan></text>
</svg>
